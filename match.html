<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>附近 Nearby — 遇見身邊的人</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --gold:#a98e5d; --gold-dim:#7a684a; --gold-bright:#c9af7e;
  --pink:#d4537e; --pink-deep:#993556;
  --bg:#0d0c0a; --panel:#171511; --panel2:#1f1c16;
  --text:#ece6da; --muted:#8d8676;
}
html,body { height:100%; }
body {
  background:var(--bg); color:var(--text);
  font-family:"PingFang TC","Noto Sans TC",-apple-system,sans-serif;
  display:flex; justify-content:center; overflow:hidden;
}
#app { width:100%; max-width:480px; height:100dvh; display:flex; flex-direction:column; position:relative; background:var(--bg); }

header {
  padding:14px 18px 10px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid rgba(169,142,93,.18);
}
.logo { font-size:20px; font-weight:600; letter-spacing:2px;
  background:linear-gradient(100deg,var(--gold-dim),var(--gold-bright) 40%,var(--gold-dim) 60%,var(--gold-bright));
  background-size:200% 100%; -webkit-background-clip:text; background-clip:text; color:transparent;
  animation:shimmer 5s linear infinite;
}
@keyframes shimmer { to { background-position:-200% 0; } }
.logo small { font-size:11px; letter-spacing:3px; opacity:.8; }
#geo-chip {
  font-size:12px; color:var(--gold); border:1px solid rgba(169,142,93,.4);
  padding:4px 12px; border-radius:999px; display:flex; align-items:center; gap:5px;
}
#geo-chip .dot { width:7px; height:7px; border-radius:50%; background:var(--gold); animation:pulse 1.6s ease infinite; }
@keyframes pulse { 50% { opacity:.3; transform:scale(.7); } }

main { flex:1; position:relative; overflow:hidden; }
.view { position:absolute; inset:0; display:none; flex-direction:column; overflow-y:auto; }
.view.active { display:flex; }

/* ===== 探索 / 滑卡 ===== */
#view-explore { padding:14px 16px 8px; overflow:hidden; }
#deck { position:relative; flex:1; min-height:0; }
.card {
  position:absolute; inset:0; border-radius:22px; overflow:hidden;
  background:var(--panel); border:1px solid rgba(169,142,93,.25);
  touch-action:none; user-select:none; will-change:transform;
  display:flex; flex-direction:column; justify-content:flex-end;
  box-shadow:0 18px 50px rgba(0,0,0,.55);
}
.card .photo { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
.card .photo span { font-size:110px; font-weight:600; color:rgba(255,255,255,.28); letter-spacing:4px; }
.card .photo::after { content:""; position:absolute; inset:0;
  background:radial-gradient(circle at 75% 20%, rgba(255,255,255,.14), transparent 45%),
             linear-gradient(to top, rgba(8,7,5,.92) 0%, rgba(8,7,5,.25) 45%, transparent 70%); }
.card .info { position:relative; padding:20px 20px 22px; z-index:2; }
.card h2 { font-size:26px; font-weight:600; }
.card h2 em { font-style:normal; font-weight:400; font-size:22px; opacity:.85; margin-left:8px; }
.card .dist { color:var(--gold-bright); font-size:13px; margin:4px 0 8px; display:flex; align-items:center; gap:5px; }
.card .bio { font-size:14px; color:rgba(236,230,218,.85); margin-bottom:10px; line-height:1.5; }
.tags { display:flex; gap:7px; flex-wrap:wrap; }
.tag { font-size:12px; padding:4px 12px; border-radius:999px; background:rgba(169,142,93,.18); color:var(--gold-bright); border:1px solid rgba(169,142,93,.35); }
.stamp {
  position:absolute; top:34px; font-size:30px; font-weight:700; letter-spacing:3px;
  padding:6px 18px; border:4px solid; border-radius:10px; opacity:0; z-index:3; pointer-events:none;
}
.stamp.like { left:22px; color:#5dca8d; border-color:#5dca8d; transform:rotate(-16deg); }
.stamp.nope { right:22px; color:#e24b4a; border-color:#e24b4a; transform:rotate(16deg); }
#empty-deck { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--muted); text-align:center; }
#empty-deck .ring { width:90px; height:90px; border-radius:50%; border:2px dashed rgba(169,142,93,.5); display:flex; align-items:center; justify-content:center; font-size:38px; animation:spin 14s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

#actions { display:flex; justify-content:center; gap:26px; padding:16px 0 10px; }
.act {
  width:62px; height:62px; border-radius:50%; border:1px solid rgba(169,142,93,.4);
  background:var(--panel2); color:var(--text); font-size:26px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:transform .15s, box-shadow .15s;
}
.act:active { transform:scale(.88); }
.act.nope { color:#e24b4a; }
.act.like { color:var(--pink); width:72px; height:72px; font-size:32px; border-color:rgba(212,83,126,.6); box-shadow:0 0 24px rgba(212,83,126,.25); }
.act.like:hover { box-shadow:0 0 34px rgba(212,83,126,.45); }
.act.rewind { color:var(--gold); font-size:22px; width:52px; height:52px; align-self:center; }

/* ===== 喜歡你 ===== */
#view-likes { padding:18px 16px 80px; }
#view-likes h3, #view-chat h3, #view-me h3 { font-size:17px; margin-bottom:4px; color:var(--gold-bright); letter-spacing:1px; }
.sub { font-size:13px; color:var(--muted); margin-bottom:16px; }
#likes-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.like-card { position:relative; border-radius:16px; overflow:hidden; aspect-ratio:3/4; border:1px solid rgba(169,142,93,.25); }
.like-card .photo { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; transition:filter .8s; }
.like-card .photo span { font-size:54px; font-weight:600; color:rgba(255,255,255,.3); }
.like-card.locked .photo { filter:blur(14px) saturate(.8); }
.like-card .lock { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; z-index:2; font-size:30px; color:rgba(255,255,255,.9); }
.like-card .lock small { font-size:12px; color:rgba(255,255,255,.7); }
.like-card .name { position:absolute; left:0; right:0; bottom:0; padding:24px 12px 10px; font-size:14px; font-weight:600; z-index:2;
  background:linear-gradient(to top, rgba(8,7,5,.9), transparent); }
#unlock-bar {
  margin-top:18px; padding:16px; border-radius:16px; text-align:center;
  background:linear-gradient(120deg, rgba(169,142,93,.22), rgba(212,83,126,.16));
  border:1px solid rgba(169,142,93,.45);
}
#unlock-bar p { font-size:13px; color:var(--text); margin-bottom:10px; }
.gold-btn {
  display:inline-block; padding:11px 30px; border-radius:999px; border:none; cursor:pointer;
  font-size:15px; font-weight:600; letter-spacing:1px; color:#1a1610;
  background:linear-gradient(110deg,var(--gold-dim),var(--gold-bright),var(--gold-dim));
  background-size:200% 100%; animation:shimmer 4s linear infinite;
}

/* ===== 聊天 ===== */
#view-chat { padding:18px 16px 80px; }
.chat-row { display:flex; align-items:center; gap:12px; padding:12px 6px; border-bottom:1px solid rgba(169,142,93,.12); cursor:pointer; }
.ava { width:52px; height:52px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:600; color:rgba(255,255,255,.85); border:2px solid rgba(169,142,93,.5); }
.chat-row .meta { flex:1; min-width:0; }
.chat-row .meta b { font-size:15px; }
.chat-row .meta p { font-size:13px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.chat-row .new-dot { width:10px; height:10px; border-radius:50%; background:var(--pink); }
#chat-empty { text-align:center; color:var(--muted); font-size:14px; padding:60px 20px; line-height:1.8; }

/* 對話視窗 */
#convo { position:absolute; inset:0; background:var(--bg); display:none; flex-direction:column; z-index:30; }
#convo.open { display:flex; }
#convo header { gap:12px; justify-content:flex-start; }
#convo-back { background:none; border:none; color:var(--gold); font-size:22px; cursor:pointer; }
#convo-msgs { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
.msg { max-width:75%; padding:10px 14px; border-radius:16px; font-size:14px; line-height:1.5; animation:popin .25s ease; }
@keyframes popin { from { opacity:0; transform:translateY(8px) scale(.96); } }
.msg.me { align-self:flex-end; background:linear-gradient(120deg,#8a7148,var(--gold-dim)); color:#15110b; border-bottom-right-radius:4px; font-weight:500; }
.msg.them { align-self:flex-start; background:var(--panel2); border:1px solid rgba(169,142,93,.2); border-bottom-left-radius:4px; }
#helper-bar { display:flex; gap:8px; padding:10px 14px 0; align-items:center; }
#helper-bar .lbl { font-size:12px; color:var(--muted); flex:none; }
.h-chip { border:1px solid rgba(169,142,93,.4); background:var(--panel2); color:var(--text); font-size:13px; padding:7px 13px; border-radius:999px; cursor:pointer; }
.h-chip.on { background:rgba(169,142,93,.25); color:var(--gold-bright); border-color:var(--gold-bright); font-weight:600; }
#helper-sugs { display:none; flex-direction:column; gap:8px; padding:10px 14px 0; }
#helper-sugs.open { display:flex; }
.h-tip { font-size:12px; color:var(--gold); }
.sug { text-align:left; background:var(--panel); border:1px dashed rgba(169,142,93,.45); color:var(--text); font-size:13px; line-height:1.5; padding:9px 14px; border-radius:14px; cursor:pointer; animation:popin .25s ease; }
.sug:active { background:rgba(169,142,93,.18); }
#convo-input { display:flex; gap:10px; padding:12px 14px calc(12px + env(safe-area-inset-bottom)); border-top:1px solid rgba(169,142,93,.18); }
#convo-input input { flex:1; background:var(--panel2); border:1px solid rgba(169,142,93,.3); border-radius:999px; padding:11px 18px; color:var(--text); font-size:14px; outline:none; }
#convo-input button { width:46px; height:46px; border-radius:50%; border:none; background:var(--pink); color:#fff; font-size:18px; cursor:pointer; }

/* ===== 我的 ===== */
#view-me { padding:18px 16px 80px; }
.me-card { display:flex; align-items:center; gap:14px; padding:16px; border-radius:16px; background:var(--panel); border:1px solid rgba(169,142,93,.25); margin-bottom:18px; }
.me-card .ava { width:64px; height:64px; font-size:24px; background:linear-gradient(135deg,#534ab7,#7f77dd); }
.setting { margin-bottom:20px; }
.setting label { font-size:14px; color:var(--text); display:flex; justify-content:space-between; margin-bottom:8px; }
.setting label b { color:var(--gold-bright); }
input[type=range] { width:100%; accent-color:var(--gold); }
.seg { display:flex; border:1px solid rgba(169,142,93,.4); border-radius:999px; overflow:hidden; }
.seg button { flex:1; padding:9px 0; background:none; border:none; color:var(--muted); font-size:14px; cursor:pointer; }
.seg button.on { background:rgba(169,142,93,.25); color:var(--gold-bright); font-weight:600; }
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:6px; }
.stat { background:var(--panel); border:1px solid rgba(169,142,93,.2); border-radius:14px; padding:14px 8px; text-align:center; }
.stat b { display:block; font-size:22px; color:var(--gold-bright); }
.stat span { font-size:12px; color:var(--muted); }

/* ===== 底部導覽 ===== */
#tabbar {
  display:flex; border-top:1px solid rgba(169,142,93,.2); background:rgba(13,12,10,.96);
  padding:6px 0 calc(6px + env(safe-area-inset-bottom));
}
#tabbar button { flex:1; background:none; border:none; color:var(--muted); font-size:11px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 0; position:relative; }
#tabbar button .ic { font-size:21px; }
#tabbar button.on { color:var(--gold-bright); }
#tabbar .badge { position:absolute; top:2px; right:calc(50% - 22px); background:var(--pink); color:#fff; font-size:10px; min-width:17px; height:17px; border-radius:999px; display:flex; align-items:center; justify-content:center; padding:0 4px; }

/* ===== 配對成功動畫 ===== */
#match-overlay {
  position:absolute; inset:0; z-index:50; display:none; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(10,8,6,.93); backdrop-filter:blur(6px); text-align:center; overflow:hidden;
}
#match-overlay.show { display:flex; }
#match-title { font-size:38px; font-weight:700; letter-spacing:4px;
  background:linear-gradient(100deg,var(--pink),var(--gold-bright),var(--pink));
  background-size:200% 100%; -webkit-background-clip:text; background-clip:text; color:transparent;
  animation:shimmer 3s linear infinite, popin .5s ease; margin-bottom:6px;
}
#match-sub { color:var(--muted); font-size:14px; margin-bottom:30px; animation:popin .7s ease; }
#match-avas { display:flex; align-items:center; margin-bottom:36px; }
#match-avas .ava { width:96px; height:96px; font-size:36px; border:3px solid var(--gold-bright); box-shadow:0 0 30px rgba(212,83,126,.4); }
#match-avas .ava.l { animation:bumpL .6s ease; }
#match-avas .ava.r { margin-left:-18px; animation:bumpR .6s ease; }
@keyframes bumpL { from { transform:translateX(-70px) rotate(-12deg); opacity:0; } }
@keyframes bumpR { from { transform:translateX(70px) rotate(12deg); opacity:0; } }
#match-heart { font-size:34px; margin:0 6px; z-index:2; animation:beat 1s ease infinite; }
@keyframes beat { 0%,100% { transform:scale(1); } 30% { transform:scale(1.35); } }
#match-overlay .gold-btn { margin-bottom:12px; }
#match-later { background:none; border:none; color:var(--muted); font-size:14px; cursor:pointer; padding:8px; }
.fheart { position:absolute; bottom:-40px; font-size:22px; animation:floatup linear forwards; pointer-events:none; }
@keyframes floatup { to { transform:translateY(-110vh) rotate(40deg); opacity:0; } }

/* ===== VIP 解鎖視窗 ===== */
#vip-modal { position:absolute; inset:0; z-index:60; display:none; align-items:flex-end; background:rgba(0,0,0,.6); }
#vip-modal.show { display:flex; }
#vip-sheet { width:100%; background:var(--panel); border-radius:24px 24px 0 0; border-top:1px solid rgba(169,142,93,.4); padding:26px 22px calc(26px + env(safe-area-inset-bottom)); animation:slideup .35s ease; text-align:center; }
@keyframes slideup { from { transform:translateY(100%); } }
#vip-sheet h3 { font-size:20px; color:var(--gold-bright); margin-bottom:6px; }
#vip-sheet .sub { margin-bottom:18px; }
.plans { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:18px; }
.plan { border:1px solid rgba(169,142,93,.35); border-radius:14px; padding:14px 6px; cursor:pointer; }
.plan.hot { border-color:var(--gold-bright); background:rgba(169,142,93,.14); position:relative; }
.plan.hot::after { content:"最划算"; position:absolute; top:-9px; left:50%; transform:translateX(-50%); font-size:10px; background:var(--gold); color:#15110b; padding:2px 8px; border-radius:999px; font-weight:600; }
.plan b { display:block; font-size:18px; color:var(--text); }
.plan span { font-size:12px; color:var(--muted); }
.plan .price { color:var(--gold-bright); font-size:14px; font-weight:600; margin-top:4px; display:block; }
#vip-close { background:none; border:none; color:var(--muted); font-size:14px; cursor:pointer; margin-top:10px; }

.toast { position:absolute; top:70px; left:50%; transform:translateX(-50%); background:rgba(31,28,22,.95); border:1px solid rgba(169,142,93,.5); color:var(--gold-bright); font-size:13px; padding:9px 20px; border-radius:999px; z-index:70; animation:popin .3s ease; white-space:nowrap; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">附近 <small>NEARBY</small></div>
    <div id="geo-chip"><span class="dot"></span><span id="geo-text">定位中…</span></div>
  </header>

  <main>
    <section class="view active" id="view-explore">
      <div id="deck">
        <div id="empty-deck">
          <div class="ring">✦</div>
          <p>附近的人都看完了<br>調大距離範圍或晚點再來看看</p>
        </div>
      </div>
      <div id="actions">
        <button class="act rewind" id="btn-rewind" title="回上一位">↺</button>
        <button class="act nope" id="btn-nope" title="略過">✕</button>
        <button class="act like" id="btn-like" title="喜歡">♥</button>
      </div>
    </section>

    <section class="view" id="view-likes">
      <h3>誰喜歡你</h3>
      <p class="sub" id="likes-sub"></p>
      <div id="likes-grid"></div>
      <div id="unlock-bar">
        <p>✨ 解鎖後直接看到喜歡你的人，立刻配對成功</p>
        <button class="gold-btn" id="btn-unlock">解鎖 VIP</button>
      </div>
    </section>

    <section class="view" id="view-chat">
      <h3>聊天</h3>
      <p class="sub">互相喜歡、配對成功後才會出現在這裡</p>
      <div id="chat-list"></div>
      <div id="chat-empty">還沒有配對 💫<br>去「探索」滑幾張卡吧！</div>
    </section>

    <section class="view" id="view-me">
      <h3>我的</h3>
      <p class="sub">個人檔案與探索設定</p>
      <div class="me-card">
        <div class="ava">源</div>
        <div><b style="font-size:17px;">正源</b>
          <p style="font-size:13px;color:var(--muted);margin-top:3px;" id="me-loc">海報設計師 · 電影迷</p>
        </div>
      </div>
      <div class="setting">
        <label>距離範圍 <b id="range-val">5 公里</b></label>
        <input type="range" id="range" min="1" max="10" step="1" value="5">
      </div>
      <div class="setting">
        <label>顯示對象</label>
        <div class="seg" id="seg-gender">
          <button data-g="F" class="on">女生</button>
          <button data-g="M">男生</button>
          <button data-g="A">不限</button>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><b id="st-like">0</b><span>送出喜歡</span></div>
        <div class="stat"><b id="st-match">0</b><span>配對成功</span></div>
        <div class="stat"><b id="st-near">0</b><span>附近的人</span></div>
      </div>
    </section>
  </main>

  <nav id="tabbar">
    <button data-v="explore" class="on"><span class="ic">🃏</span>探索</button>
    <button data-v="likes" id="tab-likes"><span class="ic">💖</span>喜歡你<span class="badge" id="likes-badge">0</span></button>
    <button data-v="chat" id="tab-chat"><span class="ic">💬</span>聊天</button>
    <button data-v="me"><span class="ic">👤</span>我的</button>
  </nav>

  <div id="match-overlay">
    <div id="match-title">配對成功！</div>
    <p id="match-sub"></p>
    <div id="match-avas">
      <div class="ava l" style="background:linear-gradient(135deg,#534ab7,#7f77dd);">源</div>
      <span id="match-heart">💗</span>
      <div class="ava r" id="match-ava2"></div>
    </div>
    <button class="gold-btn" id="match-msg">立刻傳訊息</button>
    <button id="match-later">繼續滑卡</button>
  </div>

  <div id="vip-modal">
    <div id="vip-sheet">
      <h3>✨ 附近 VIP</h3>
      <p class="sub">看誰喜歡你 · 無限回溯 · 每天 5 個超級喜歡</p>
      <div class="plans">
        <div class="plan"><b>1 個月</b><span>輕鬆體驗</span><span class="price">NT$190</span></div>
        <div class="plan hot"><b>6 個月</b><span>每月 $80</span><span class="price">NT$480</span></div>
        <div class="plan"><b>12 個月</b><span>每月 $58</span><span class="price">NT$690</span></div>
      </div>
      <button class="gold-btn" id="vip-demo">示範解鎖（免費體驗）</button><br>
      <button id="vip-close">下次再說</button>
    </div>
  </div>

  <div id="convo">
    <header>
      <button id="convo-back">‹</button>
      <div class="ava" id="convo-ava" style="width:40px;height:40px;font-size:16px;"></div>
      <div><b id="convo-name"></b><p style="font-size:12px;color:var(--gold);">● 線上</p></div>
    </header>
    <div id="convo-msgs"></div>
    <div id="helper-bar">
      <span class="lbl">💡 助攻</span>
      <button class="h-chip" data-m="hot">🔥 熱聊中</button>
      <button class="h-chip" data-m="mid">🙂 普通</button>
      <button class="h-chip" data-m="cold">🧊 冷淡</button>
    </div>
    <div id="helper-sugs"></div>
    <div id="convo-input">
      <input id="msg-input" placeholder="輸入訊息…" autocomplete="off">
      <button id="msg-send">➤</button>
    </div>
  </div>
</div>

<script>
const GRADS = [
  ["#993556","#d4537e"],["#534ab7","#7f77dd"],["#0f6e56","#1d9e75"],
  ["#854f0b","#ef9f27"],["#185fa5","#378add"],["#712b13","#d85a30"],
  ["#3c3489","#afa9ec"],["#72243e","#ed93b1"]
];
const PEOPLE = [
  { name:"小雅", age:28, g:"F", bio:"喜歡假日去爬山，最近迷上老電影海報 🎬", tags:["電影","爬山","攝影"], likedYou:true },
  { name:"欣怡", age:25, g:"F", bio:"咖啡因中毒患者，尋找一起探店的人", tags:["咖啡","探店","貓派"], likedYou:false },
  { name:"佩珊", age:31, g:"F", bio:"劇場工作者，週末常看舞台劇", tags:["戲劇","音樂","紅酒"], likedYou:true },
  { name:"志明", age:30, g:"M", bio:"健身教練，也愛下廚做健康餐", tags:["健身","料理","籃球"], likedYou:false },
  { name:"雨彤", age:26, g:"F", bio:"插畫接案中，喜歡逛美術館", tags:["插畫","美術館","旅行"], likedYou:true },
  { name:"家豪", age:33, g:"M", bio:"工程師，假日騎單車環河濱", tags:["單車","桌遊","美食"], likedYou:false },
  { name:"思婷", age:29, g:"F", bio:"剛搬來這區，想認識附近的朋友！", tags:["瑜珈","烘焙","狗派"], likedYou:false },
  { name:"婉婷", age:27, g:"F", bio:"電影系畢業，海報控，收藏了一櫃子", tags:["電影","海報","展覽"], likedYou:true },
  { name:"俊傑", age:28, g:"M", bio:"攝影師，街拍與人像", tags:["攝影","爵士","登山"], likedYou:false },
  { name:"乃文", age:24, g:"F", bio:"研究生，咖啡廳寫論文常駐民", tags:["閱讀","手帳","茶"], likedYou:false }
];
const REPLIES = ["哈囉～很開心配對到你！","你也住這附近嗎？我常去河堤散步","看你的興趣跟我好像 😊","週末有空一起喝杯咖啡嗎？","你的頭貼是自己設計的嗎？好好看！"];
const HELPERS = {
  hot: { tip:"🔥 她回得快、聊得起勁 → 乘勝追擊，大方提出見面", lines:[
    "跟你聊天時間過得好快，不知不覺聊這麼久了",
    "你說的那家店我也一直想去，週末要不要一起？",
    "感覺我們蠻聊得來的，要不要約出來喝杯咖啡？",
    "你笑點跟我也太像了吧，本人應該更好笑 😆",
    "下次見面你一定要把這個故事講完",
    "那就這麼說定了！地點你挑，時間我配合"
  ]},
  mid: { tip:"🙂 一來一往普通熱度 → 丟好接的話題、具體的讚美", lines:[
    "你週末通常都怎麼過？宅在家還是往外跑？",
    "大頭貼那張是在哪拍的？氛圍感好好",
    "我猜你是會自己一個人去探店的類型，對吧？",
    "如果給你一天假＋預算無上限，你會去哪裡？",
    "你那個興趣是怎麼開始的？感覺蠻有故事的",
    "你說喜歡爬山，最推薦哪一條步道？我想去走走"
  ]},
  cold: { tip:"🧊 慢回、已讀 → 輕鬆不糾纏，留台階給彼此", lines:[
    "忙的話不用急著回，先跟你說晚安 😊",
    "今天經過一間烘焙店，突然想到你說過喜歡做甜點",
    "最近比較忙齁？等你有空再聊～",
    "分享一下：我剛剛看到一隻超好笑的貓影片",
    "不知道為什麼，直覺你今天心情不錯",
    "好啦我猜你在忙，被我說中的話回一個表情就好"
  ]}
};

let me = { lat:25.0330, lng:121.5654 };
let geoOk = false;
let users = [];
let deck = [];
let history = [];
let matches = [];
let unlocked = false;
let stats = { like:0, match:0 };
let rangeKm = 5, genderPref = "F";
let convoUser = null;

function seedUsers() {
  users = PEOPLE.map((p,i) => {
    const d = 0.4 + Math.random()*7.2;
    const th = Math.random()*Math.PI*2;
    return Object.assign({ id:i,
      lat: me.lat + (d/111)*Math.cos(th),
      lng: me.lng + (d/(111*Math.cos(me.lat*Math.PI/180)))*Math.sin(th),
      grad: GRADS[i % GRADS.length].join(",")
    }, p);
  });
}
function distKm(u) {
  const R=6371, dLa=(u.lat-me.lat)*Math.PI/180, dLo=(u.lng-me.lng)*Math.PI/180;
  const a=Math.sin(dLa/2)**2 + Math.cos(me.lat*Math.PI/180)*Math.cos(u.lat*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function visible(u) {
  return distKm(u) <= rangeKm && (genderPref==="A" || u.g===genderPref);
}

/* ===== 滑卡 ===== */
function buildDeck() {
  deck = users.filter(u => visible(u) && !u.swiped).sort((a,b)=>distKm(a)-distKm(b));
  renderDeck();
  document.getElementById("st-near").textContent = users.filter(visible).length;
}
function cardEl(u) {
  const el = document.createElement("div");
  el.className = "card";
  el.innerHTML = `
    <div class="photo" style="background:linear-gradient(135deg,${u.grad});"><span>${u.name[0]}</span></div>
    <div class="stamp like">喜歡</div><div class="stamp nope">略過</div>
    <div class="info">
      <h2>${u.name}<em>${u.age}</em></h2>
      <div class="dist">📍 距離約 ${distKm(u).toFixed(1)} 公里</div>
      <div class="bio">${u.bio}</div>
      <div class="tags">${u.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
    </div>`;
  return el;
}
function renderDeck() {
  const dk = document.getElementById("deck");
  dk.querySelectorAll(".card").forEach(c=>c.remove());
  document.getElementById("empty-deck").style.display = deck.length ? "none" : "flex";
  deck.slice(0,3).reverse().forEach((u,i,arr) => {
    const el = cardEl(u);
    const depth = arr.length-1-i;
    el.style.transform = `translateY(${depth*10}px) scale(${1-depth*0.04})`;
    el.style.zIndex = 10-depth;
    dk.appendChild(el);
    if (depth===0) attachDrag(el, u);
  });
}
function attachDrag(el, u) {
  let sx=0, sy=0, dx=0, dy=0, dragging=false;
  el.addEventListener("pointerdown", e => {
    dragging=true; sx=e.clientX; sy=e.clientY;
    el.style.transition="none"; el.setPointerCapture(e.pointerId);
  });
  el.addEventListener("pointermove", e => {
    if(!dragging) return;
    dx=e.clientX-sx; dy=e.clientY-sy;
    el.style.transform=`translate(${dx}px,${dy}px) rotate(${dx*0.06}deg)`;
    el.querySelector(".stamp.like").style.opacity = Math.min(dx/80,1);
    el.querySelector(".stamp.nope").style.opacity = Math.min(-dx/80,1);
  });
  el.addEventListener("pointerup", () => {
    if(!dragging) return; dragging=false;
    if (dx>110) flingOut(el,u,1);
    else if (dx<-110) flingOut(el,u,-1);
    else {
      el.style.transition="transform .3s cubic-bezier(.2,.8,.3,1.2)";
      el.style.transform="translate(0,0) rotate(0)";
      el.querySelectorAll(".stamp").forEach(s=>s.style.opacity=0);
    }
  });
}
function flingOut(el, u, dir) {
  el.style.transition="transform .35s ease, opacity .35s";
  el.style.transform=`translate(${dir*560}px, ${dir*40-20}px) rotate(${dir*28}deg)`;
  el.style.opacity="0";
  u.swiped = true; history.push(u);
  if (dir===1) {
    stats.like++; document.getElementById("st-like").textContent = stats.like;
    if (u.likedYou) setTimeout(()=>showMatch(u), 330);
  }
  setTimeout(()=>{ deck = deck.filter(x=>x!==u); renderDeck(); }, 340);
}
function swipeTop(dir) {
  const top = deck[0]; if(!top) return;
  const el = document.querySelector("#deck .card:last-child");
  if (el) { el.querySelector(dir===1?".stamp.like":".stamp.nope").style.opacity=1; flingOut(el, top, dir); }
}
document.getElementById("btn-like").onclick = ()=>swipeTop(1);
document.getElementById("btn-nope").onclick = ()=>swipeTop(-1);
document.getElementById("btn-rewind").onclick = () => {
  const u = history.pop();
  if (!u) return toast("沒有可以回溯的卡片");
  u.swiped = false; buildDeck(); toast(`回到 ${u.name} 的卡片 ↺`);
};

/* ===== 配對動畫 ===== */
function showMatch(u) {
  stats.match++; document.getElementById("st-match").textContent = stats.match;
  matches.push(Object.assign({ msgs:[{me:false,t:`嗨！我們配對成功了 🎉`}] , unread:true }, u));
  const ov = document.getElementById("match-overlay");
  document.getElementById("match-sub").textContent = `你和 ${u.name} 互相喜歡了，距離只有 ${distKm(u).toFixed(1)} 公里`;
  const av = document.getElementById("match-ava2");
  av.textContent = u.name[0]; av.style.background = `linear-gradient(135deg,${u.grad})`;
  ov.classList.add("show");
  for (let i=0;i<16;i++) {
    const h=document.createElement("span"); h.className="fheart"; h.textContent=["💗","💛","✨","💖"][i%4];
    h.style.left = (5+Math.random()*90)+"%";
    h.style.animationDuration = (2.5+Math.random()*2.5)+"s";
    h.style.animationDelay = (Math.random()*1.2)+"s";
    ov.appendChild(h);
    setTimeout(()=>h.remove(), 6000);
  }
  document.getElementById("match-msg").onclick = ()=>{ ov.classList.remove("show"); openConvo(matches[matches.length-1]); };
  renderChatList(); updateBadges();
}
document.getElementById("match-later").onclick = ()=>document.getElementById("match-overlay").classList.remove("show");

/* ===== 誰喜歡你 ===== */
function renderLikes() {
  const list = users.filter(u=>u.likedYou && !matches.find(m=>m.id===u.id));
  document.getElementById("likes-sub").textContent = unlocked
    ? `${list.length} 個人喜歡你，點他們的卡片直接配對！`
    : `已經有 ${list.length} 個人喜歡你，解鎖看看是誰`;
  const grid = document.getElementById("likes-grid");
  grid.innerHTML = "";
  list.forEach(u => {
    const c = document.createElement("div");
    c.className = "like-card" + (unlocked ? "" : " locked");
    c.innerHTML = `
      <div class="photo" style="background:linear-gradient(135deg,${u.grad});"><span>${u.name[0]}</span></div>
      ${unlocked ? `<div class="name">${u.name}，${u.age} · ${distKm(u).toFixed(1)} km</div>`
                 : `<div class="lock">🔒<small>VIP 解鎖</small></div>`}`;
    if (unlocked) c.onclick = ()=>{ u.swiped=true; showMatch(u); renderLikes(); };
    else c.onclick = openVip;
    grid.appendChild(c);
  });
  document.getElementById("unlock-bar").style.display = unlocked ? "none" : "block";
  updateBadges();
}
function openVip(){ document.getElementById("vip-modal").classList.add("show"); }
document.getElementById("btn-unlock").onclick = openVip;
document.getElementById("vip-close").onclick = ()=>document.getElementById("vip-modal").classList.remove("show");
document.getElementById("vip-demo").onclick = () => {
  unlocked = true;
  document.getElementById("vip-modal").classList.remove("show");
  renderLikes(); toast("✨ VIP 已解鎖（示範模式）");
};

/* ===== 聊天 ===== */
function renderChatList() {
  const list = document.getElementById("chat-list");
  document.getElementById("chat-empty").style.display = matches.length ? "none" : "block";
  list.innerHTML = "";
  matches.forEach(m => {
    const row = document.createElement("div");
    row.className = "chat-row";
    const last = m.msgs[m.msgs.length-1];
    row.innerHTML = `
      <div class="ava" style="background:linear-gradient(135deg,${m.grad});">${m.name[0]}</div>
      <div class="meta"><b>${m.name}</b><p>${last.me?"你：":""}${last.t}</p></div>
      ${m.unread ? '<span class="new-dot"></span>' : ""}`;
    row.onclick = ()=>openConvo(m);
    list.appendChild(row);
  });
  updateBadges();
}
function openConvo(m) {
  convoUser = m; m.unread = false;
  document.getElementById("convo-name").textContent = m.name;
  const av = document.getElementById("convo-ava");
  av.textContent = m.name[0]; av.style.background = `linear-gradient(135deg,${m.grad})`;
  renderMsgs();
  document.getElementById("convo").classList.add("open");
  renderChatList();
}
function renderMsgs() {
  const box = document.getElementById("convo-msgs");
  box.innerHTML = convoUser.msgs.map(m=>`<div class="msg ${m.me?"me":"them"}">${m.t}</div>`).join("");
  box.scrollTop = box.scrollHeight;
}
function sendMsg() {
  const inp = document.getElementById("msg-input");
  const t = inp.value.trim(); if(!t || !convoUser) return;
  convoUser.msgs.push({me:true,t}); inp.value=""; renderMsgs();
  const u = convoUser;
  setTimeout(()=>{
    u.msgs.push({me:false, t:REPLIES[Math.floor(Math.random()*REPLIES.length)]});
    if (convoUser===u) renderMsgs();
    else u.unread = true;
    renderChatList();
  }, 1100 + Math.random()*900);
}
function renderHelper(mode) {
  const box = document.getElementById("helper-sugs");
  const h = HELPERS[mode];
  const picks = [...h.lines].sort(()=>Math.random()-.5).slice(0,3);
  box.innerHTML = `<div class="h-tip">${h.tip}（點一句直接帶入）</div>` +
    picks.map(t=>`<button class="sug">${t}</button>`).join("");
  box.classList.add("open");
  box.querySelectorAll(".sug").forEach(s => {
    s.onclick = () => {
      const inp = document.getElementById("msg-input");
      inp.value = s.textContent; inp.focus();
      box.classList.remove("open");
      document.querySelectorAll(".h-chip").forEach(x=>x.classList.remove("on"));
    };
  });
}
document.querySelectorAll(".h-chip").forEach(b => {
  b.onclick = () => {
    document.querySelectorAll(".h-chip").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    renderHelper(b.dataset.m);
  };
});
document.getElementById("msg-send").onclick = sendMsg;
document.getElementById("msg-input").addEventListener("keydown", e=>{ if(e.key==="Enter") sendMsg(); });
document.getElementById("convo-back").onclick = ()=>{ document.getElementById("convo").classList.remove("open"); convoUser=null; renderChatList(); };

/* ===== 分頁與設定 ===== */
document.querySelectorAll("#tabbar button").forEach(b => {
  b.onclick = () => {
    document.querySelectorAll("#tabbar button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on");
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
    document.getElementById("view-"+b.dataset.v).classList.add("active");
    if (b.dataset.v==="likes") renderLikes();
    if (b.dataset.v==="chat") renderChatList();
  };
});
function updateBadges() {
  const n = users.filter(u=>u.likedYou && !matches.find(m=>m.id===u.id)).length;
  const badge = document.getElementById("likes-badge");
  badge.textContent = n; badge.style.display = n ? "flex" : "none";
}
document.getElementById("range").oninput = e => {
  rangeKm = +e.target.value;
  document.getElementById("range-val").textContent = rangeKm + " 公里";
  buildDeck();
};
document.querySelectorAll("#seg-gender button").forEach(b => {
  b.onclick = () => {
    document.querySelectorAll("#seg-gender button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); genderPref = b.dataset.g; buildDeck();
  };
});
function toast(t) {
  const el = document.createElement("div");
  el.className="toast"; el.textContent=t;
  document.getElementById("app").appendChild(el);
  setTimeout(()=>el.remove(), 2200);
}

/* ===== GPS 定位 ===== */
function initGeo() {
  const chip = document.getElementById("geo-text");
  if (!navigator.geolocation) { chip.textContent="示範位置：台北"; start(); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      me.lat = pos.coords.latitude; me.lng = pos.coords.longitude; geoOk = true;
      chip.textContent = "已定位 · 附近 " + rangeKm + " 公里";
      document.getElementById("me-loc").textContent = "📍 已開啟定位 · 顯示附近的人";
      start();
    },
    () => { chip.textContent="示範位置：台北"; start(); },
    { timeout: 6000 }
  );
  setTimeout(()=>{ if(!users.length) start(); }, 6500);
}
let started = false;
function start() {
  if (started) return; started = true;
  seedUsers(); buildDeck(); renderLikes(); renderChatList();
}
initGeo();
</script>
