<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陳正源 STONE CHEN — 電影與戲劇海報作品集</title>
<style>
  :root {
    --bg: #0a0a0c;
    --bg2: #131316;
    --card: #18181d;
    --text: #f2efe8;
    --muted: #9a968e;
    --accent: #b29760;
    --gold-light: #dcc99a;
    --gold-dim: rgba(181,153,100,.48);
    --radius: 8px;
    --serif: "Didot", "Bodoni 72", "Playfair Display", "Songti TC", "Noto Serif TC", "Times New Roman", serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  img { max-width: 100%; }
  body { overflow-x: hidden; }
  body {
    background:
      radial-gradient(ellipse 90% 60% at 50% -10%, rgba(169,142,93,.07), transparent 60%),
      repeating-linear-gradient(135deg, rgba(255,255,255,.012) 0 1px, transparent 1px 9px),
      repeating-linear-gradient(45deg, rgba(169,142,93,.014) 0 1px, transparent 1px 9px),
      var(--bg);
    background-attachment: fixed;
    color: var(--text);
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    -webkit-font-smoothing: antialiased;
  }


  /* 黑絲綢波紋背景（全頁、微微波動） */
  #silkCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
  }

  /* 金色漸層文字：帶緩慢流動的光澤 */
  .gold-text {
    background: linear-gradient(100deg,
      #9e8253 0%, #d3c294 22%, #f1e6c6 38%, #d3c294 54%, #8e774a 72%, #9e8253 100%);
    background-size: 220% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    animation: text-sheen 7s linear infinite;
  }
  @keyframes text-sheen {
    to { background-position: 220% center; }
  }
  /* Art Deco 裝飾線：─────◆───── 帶流光 */
  .deco-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin: 26px auto 0;
    max-width: 560px;
  }
  .deco-line::before, .deco-line::after {
    content: "";
    flex: 1;
    height: 1px;
    background:
      linear-gradient(90deg, transparent, rgba(233,221,187,.9), transparent) no-repeat,
      linear-gradient(90deg, transparent, var(--gold-dim));
    background-size: 34% 100%, 100% 100%;
    animation: line-glint 5s ease-in-out infinite;
    box-shadow: 0 0 10px rgba(169,142,93,.18);
  }
  .deco-line::after {
    background:
      linear-gradient(90deg, transparent, rgba(233,221,187,.9), transparent) no-repeat,
      linear-gradient(90deg, var(--gold-dim), transparent);
    background-size: 34% 100%, 100% 100%;
    animation-delay: 2.5s;
  }
  @keyframes line-glint {
    0%, 35%   { background-position: -40% 0, 0 0; }
    65%, 100% { background-position: 140% 0, 0 0; }
  }
  .deco-line .diamond {
    width: 7px;
    height: 7px;
    background: var(--gold-light);
    transform: rotate(45deg);
    animation: diamond-pulse 3s ease-in-out infinite;
  }
  @keyframes diamond-pulse {
    0%, 100% { box-shadow: 0 0 6px rgba(210,191,142,.5); }
    50%      { box-shadow: 0 0 16px rgba(233,221,187,.95), 0 0 30px rgba(169,142,93,.45); }
  }

  /* ── 頁首 ── */
  header {
    padding: 64px 24px 36px;
    text-align: center;
    border-top: 3px double var(--gold-dim);
    position: relative;
    overflow: hidden;
  }
  /* 金粉粒子畫布 */
  #dustCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  header > *:not(#dustCanvas) { position: relative; z-index: 1; }
  header::before {
    content: "";
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: min(92%, 980px);
    height: 1px;
    background:
      linear-gradient(90deg, transparent, rgba(233,221,187,.8), transparent) no-repeat,
      linear-gradient(90deg, transparent, var(--gold-dim) 20%, var(--gold-dim) 80%, transparent);
    background-size: 26% 100%, 100% 100%;
    animation: line-glint 6s ease-in-out infinite;
    box-shadow: 0 0 12px rgba(169,142,93,.22);
  }
  header h1 {
    font-family: var(--serif);
    font-size: clamp(34px, 6vw, 60px);
    font-weight: 700;
    letter-spacing: .14em;
  }
  header h1 .en {
    display: block;
    font-size: .38em;
    letter-spacing: .3em;
    margin-top: 12px;
    font-weight: 400;
  }
  header p.sub {
    margin-top: 16px;
    color: var(--muted);
    font-size: clamp(13px, 2vw, 16px);
    letter-spacing: .5em;
    text-indent: .5em;
  }
  header .count {
    display: inline-block;
    margin-top: 24px;
    padding: 7px 26px;
    border: 1px solid var(--gold-dim);
    outline: 1px solid rgba(169,142,93,.15);
    outline-offset: 3px;
    color: var(--gold-light);
    font-size: 13px;
    letter-spacing: .18em;
  }

  /* ── 海報輪播帶 ── */
  .marquee {
    overflow: hidden;
    margin-top: 38px;
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent);
    mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent);
  }
  .marquee .track {
    display: flex;
    gap: 5px;
    width: max-content;
    will-change: transform;
    padding: 20px 0 84px;     /* 下方留弧線下凹的空間 */
  }
  .marquee .track.rev {
    padding: 72px 0 26px;     /* 上方留弧線上拱的空間 */
  }
  /* 膠卷格：上下兩排齒孔 */
  .mq-item {
    flex: none;
    will-change: transform;
    background: #131310;
    padding: 3px 7px;
    border-radius: 2px;
    box-shadow: 0 6px 20px rgba(0,0,0,.5);
  }
  .mq-item::before, .mq-item::after {
    content: "";
    display: block;
    height: 11px;
    background-image: radial-gradient(ellipse 4.2px 3.4px at 7px 5.5px, rgba(233,221,187,.85) 0 68%, transparent 75%);
    background-size: 15px 11px;
    background-repeat: repeat-x;
  }
  .mq-item::before { margin-bottom: 4px; }
  .mq-item::after { margin-top: 4px; }
  .marquee img {
    height: clamp(120px, 18vw, 185px);
    width: auto;
    border-radius: 3px;
    display: block;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
    transition: transform .3s ease, box-shadow .3s ease;
  }
  .marquee img:hover {
    transform: scale(1.06);
    box-shadow: 0 16px 36px rgba(0,0,0,.7), 0 0 0 2px rgba(169,142,93,.55);
  }
  @keyframes marquee-scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* ── 工具列 ── */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(10,10,12,.92);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(169,142,93,.22);
    border-bottom: 1px solid rgba(169,142,93,.22);
    padding: 12px clamp(12px, 3vw, 32px);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  .toolbar input[type="search"] {
    flex: 1 1 260px;
    max-width: 440px;
    background: var(--card);
    border: 1px solid #2e2e36;
    border-radius: 999px;
    padding: 13px 24px;
    color: var(--text);
    font-size: 16px;
    outline: none;
  }
  .toolbar input[type="search"]:focus { border-color: var(--accent); }
  .toolbar select {
    background: var(--card);
    border: 1px solid #2e2e36;
    border-radius: 999px;
    padding: 13px 16px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    max-width: 240px;
  }
  .toolbar .info {
    margin-left: auto;
    color: var(--muted);
    font-size: 13px;
    white-space: nowrap;
  }

  /* ── 內容 ── */
  .content { padding: 10px clamp(12px, 3vw, 36px) 60px; }

  .year-divider {
    display: flex;
    align-items: center;
    gap: 20px;
    margin: 54px 0 10px;
  }
  .year-divider .y {
    font-family: var(--serif);
    font-size: clamp(32px, 4.5vw, 48px);
    font-weight: 700;
    letter-spacing: .08em;
    line-height: 1;
    background: linear-gradient(180deg, #e6dcbe, #c1aa75 55%, #79633b);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 24px rgba(169,142,93,.25);
  }
  .year-divider::before {
    content: "";
    width: 7px;
    height: 7px;
    background: var(--gold-light);
    transform: rotate(45deg);
    flex: none;
    animation: diamond-pulse 3.5s ease-in-out infinite;
  }
  .year-divider::after {
    content: "";
    flex: 1;
    height: 3px;
    border-top: 1px solid var(--gold-dim);
    border-bottom: 1px solid rgba(169,142,93,.16);
    box-shadow: 0 0 10px rgba(169,142,93,.15);
  }

  section.film { margin: 26px 0 6px; }
  .film-head {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 14px;
    padding-left: 14px;
    border-left: 2px solid var(--accent);
  }
  .film-head h2 {
    font-family: var(--serif);
    font-size: clamp(25px, 3.4vw, 34px);
    font-weight: 700;
    letter-spacing: .06em;
  }
  .film-head .n { color: var(--muted); font-size: 13px; }
  .film-head .est { color: #6f6b63; font-size: 12px; }

  .masonry {
    columns: 5 230px;
    column-gap: 14px;
  }
  .item {
    break-inside: avoid;
    margin-bottom: 14px;
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--card);
    cursor: zoom-in;
    position: relative;
    transition: transform .25s ease, box-shadow .25s ease;
  }
  .item:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 34px rgba(0,0,0,.6), 0 0 0 1px rgba(181,153,100,.45);
  }
  .item img {
    width: 100%;
    height: auto;
    display: block;
    background: var(--bg2);
    transition: transform .4s ease;
  }
  .item:hover img { transform: scale(1.07); }
  .item .label {
    position: absolute;
    inset: auto 0 0 0;
    padding: 26px 12px 10px;
    font-size: 12.5px;
    line-height: 1.4;
    color: #fff;
    background: linear-gradient(transparent, rgba(0,0,0,.82));
    opacity: 0;
    transition: opacity .25s ease;
    pointer-events: none;
  }
  .item:hover .label { opacity: 1; }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 80px 20px;
    font-size: 15px;
    display: none;
  }

  /* ── 燈箱 ── */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(8,8,10,.96);
    display: none;
    align-items: center;
    justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: min(94vw, 1400px);
    max-height: 86vh;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 20px 80px rgba(0,0,0,.8);
  }
  .lightbox .caption {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: var(--text);
    font-size: 14px;
    max-width: 90vw;
  }
  .lightbox .caption .film-name { color: var(--accent); font-size: 12px; }
  .lb-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,.07);
    border: none;
    color: var(--text);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    font-size: 22px;
    cursor: pointer;
    transition: background .2s;
    user-select: none;
  }
  .lb-btn:hover { background: rgba(169,142,93,.3); }
  .lb-prev { left: 16px; }
  .lb-next { right: 16px; }
  .lb-close {
    position: absolute;
    top: 14px;
    right: 16px;
    background: rgba(255,255,255,.07);
    border: none;
    color: var(--text);
    width: 42px;
    height: 42px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
  }
  .lb-close:hover { background: rgba(169,142,93,.3); }
  .lb-play {
    position: absolute;
    top: 14px;
    right: 70px;
    background: rgba(255,255,255,.07);
    border: none;
    color: var(--text);
    width: 42px;
    height: 42px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
  }
  .lb-play:hover { background: rgba(181,153,100,.3); }
  .lb-counter {
    position: absolute;
    top: 24px;
    left: 24px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: .05em;
  }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 36px 20px 56px;
    border-top: 3px double var(--gold-dim);
    letter-spacing: .14em;
  }

  @media (max-width: 600px) {
    header { padding: 40px 14px 24px; }
    header h1 { font-size: 27px; letter-spacing: .08em; white-space: nowrap; }
    header p.sub { letter-spacing: .3em; text-indent: .3em; font-size: 12px; }
    header .count { font-size: 12px; padding: 6px 16px; }
    .deco-line { max-width: 78%; }
    .marquee { margin-top: 24px; }
    .marquee img { height: 108px; border-radius: 3px; }
    .marquee .track { gap: 4px; padding: 12px 0 46px; }
    .marquee .track.rev { padding: 40px 0 14px; }
    .toolbar { padding: 10px 12px; gap: 8px; }
    .toolbar input[type="search"] { flex: 1 1 150px; max-width: none; padding: 12px 18px; font-size: 16px; }
    .toolbar select { flex: 0 1 auto; max-width: 46%; padding: 8px 10px; font-size: 13px; }
    .toolbar .info { display: none; }
    .year-divider { margin: 36px 0 6px; gap: 12px; }
    .year-divider .y { font-size: 28px; }
    .film-head { padding-left: 10px; gap: 8px; }
    .film-head h2 { font-size: 22px; }
    .masonry { columns: 2 140px; column-gap: 10px; }
    .item { margin-bottom: 10px; border-radius: 6px; }
    .lb-btn { width: 40px; height: 40px; font-size: 18px; }
    .lb-prev { left: 8px; }
    .lb-next { right: 8px; }
    .lightbox img { max-width: 96vw; max-height: 80vh; }
  }
</style>
</head>
<body>

<header>
  <canvas id="dustCanvas"></canvas>
  <h1 class="gold-text">陳正源 · 海報作品集<span class="en">STONE CHEN · Poster Portfolio</span></h1>
  <div class="deco-line"><span class="diamond"></span></div>
  <p class="sub">電影 × 戲劇 視覺設計</p>
  <span class="count" id="totalCount"></span>
  <div class="marquee" id="marquee">
    <div class="track" id="marqueeTrack"></div>
    <div class="track rev" id="marqueeTrack2"></div>
  </div>
</header>

<div class="toolbar">
  <input type="search" id="searchBox" placeholder="搜尋片名…">
  <select id="filmSelect"><option value="">全部作品（依年份）</option></select>
  <span class="info" id="shownInfo"></span>
</div>

<div class="content" id="content"></div>
<div class="empty" id="emptyMsg">沒有符合的作品</div>

<div class="lightbox" id="lightbox">
  <span class="lb-counter" id="lbCounter"></span>
  <button class="lb-close" id="lbClose" title="關閉 (Esc)">✕</button>
  <button class="lb-play" id="lbPlay" title="自動播放/暫停">⏸</button>
  <button class="lb-btn lb-prev" id="lbPrev" title="上一張 (←)">‹</button>
  <img id="lbImg" alt="">
  <button class="lb-btn lb-next" id="lbNext" title="下一張 (→)">›</button>
  <div class="caption" id="lbCaption"></div>
</div>

<footer>© 陳正源 STONE CHEN 電影與戲劇海報作品集</footer>

<script src="images.js?v=13"></script>
<script>
(function () {
  const content = document.getElementById('content');
  const searchBox = document.getElementById('searchBox');
  const filmSelect = document.getElementById('filmSelect');
  const shownInfo = document.getElementById('shownInfo');
  const emptyMsg = document.getElementById('emptyMsg');

  // 圖片依片名分組
  const itemsByFilm = new Map();
  for (const it of DATA.items) {
    if (!itemsByFilm.has(it.g)) itemsByFilm.set(it.g, []);
    itemsByFilm.get(it.g).push(it);
  }

  // 片單排序：年份新到舊，「其他」類放最後
  const LAST = new Set(['其他設計作品', '近期作品精選']);
  const films = DATA.films.slice().sort((a, b) => {
    const la = LAST.has(a.n), lb = LAST.has(b.n);
    if (la !== lb) return la ? 1 : -1;
    if (b.y !== a.y) return b.y - a.y;
    return a.n.localeCompare(b.n, 'zh-Hant');
  });

  document.getElementById('totalCount').textContent =
    '共 ' + DATA.items.length + ' 件作品 · ' + films.length + ' 部影視作品';

  // 下拉片單
  for (const f of films) {
    const opt = document.createElement('option');
    opt.value = f.n;
    opt.textContent = (f.y && !LAST.has(f.n) ? f.y + ' · ' : '') + f.n +
                      '（' + itemsByFilm.get(f.n).length + '）';
    filmSelect.appendChild(opt);
  }

  // ── 黑絲綢波紋背景：暗色綢緞波帶 + 沿波峰流淌的金粉，微微波動 ──
  (function silkBackground() {
    const canvas = document.createElement('canvas');
    canvas.id = 'silkCanvas';
    document.body.prepend(canvas);
    const ctx = canvas.getContext('2d');
    let W = 0, H = 0;
    const dpr = Math.min(window.devicePixelRatio || 1, 1.5);

    // 波帶設定：位置、起伏、波長、速度、金粉散佈寬度
    const bands = [
      { yp: .16, amp: 30, k: .0034, sp: .045, spread: 26, n: 150 },
      { yp: .40, amp: 44, k: .0026, sp: .032, spread: 36, n: 190 },
      { yp: .64, amp: 34, k: .0030, sp: .040, spread: 30, n: 160 },
      { yp: .87, amp: 46, k: .0022, sp: .027, spread: 38, n: 170 }
    ];
    const golds = ['233,221,187', '214,193,142', '186,160,108', '169,142,93'];

    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const scale = Math.min(1, W / 1200);
      for (const b of bands) {
        b.ps = [];
        const count = Math.round(b.n * scale);
        for (let i = 0; i < count; i++) {
          // 高斯式散佈：粒子集中在波峰線附近
          const g = (Math.random() + Math.random() + Math.random()) / 3;
          b.ps.push({
            u: Math.random(),
            dy: (g - .5) * 2 * b.spread,
            r: .3 + Math.random() * 1.1,
            tw: .4 + Math.random() * 1.8,
            phase: Math.random() * Math.PI * 2,
            drift: .002 + Math.random() * .006,   // 沿波帶緩緩漂移
            color: golds[Math.floor(Math.random() * golds.length)]
          });
        }
      }
    }
    resize();
    window.addEventListener('resize', resize);

    function curveY(b, x, s) {
      return H * b.yp
        + Math.sin(x * b.k + s * b.sp * 6 + b.yp * 9) * b.amp
        + Math.sin(x * b.k * 2.1 - s * b.sp * 3.6 + 2) * b.amp * .38;
    }

    function draw(t) {
      const s = t / 1000;
      ctx.clearRect(0, 0, W, H);
      for (const b of bands) {
        // 綢緞光澤：沿波線疊幾道暗暗的柔光
        for (const sh of [{ lw: b.spread * 4.2, a: .015 }, { lw: b.spread * 2.2, a: .02 }, { lw: b.spread * .9, a: .025 }]) {
          ctx.beginPath();
          for (let x = -20; x <= W + 20; x += 14) {
            const y = curveY(b, x, s);
            x <= -20 + 13 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.strokeStyle = 'rgba(196,184,158,' + sh.a + ')';
          ctx.lineWidth = sh.lw;
          ctx.lineCap = 'round';
          ctx.stroke();
        }
        // 金粉：貼著波線分佈、各自閃爍、沿波帶漂移
        for (const p of b.ps) {
          p.u += p.drift / 60;
          if (p.u > 1.02) p.u = -0.02;
          const x = p.u * W;
          const y = curveY(b, x, s) + p.dy;
          const fall = 1 - Math.min(1, Math.abs(p.dy) / b.spread);   // 離波線越遠越淡
          const a = Math.max(0, (.08 + .72 * (0.5 + 0.5 * Math.sin(s * p.tw * 2 + p.phase))) * (.25 + .75 * fall));
          ctx.beginPath();
          ctx.arc(x, y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(' + p.color + ',' + (a * .92).toFixed(3) + ')';
          ctx.fill();
        }
      }
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  })();

  // ── 金粉粒子：在頁首飄動、閃爍 ──
  (function goldDust() {
    const canvas = document.getElementById('dustCanvas');
    const ctx = canvas.getContext('2d');
    const header = canvas.parentElement;
    let W = 0, H = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);

    function resize() {
      W = header.clientWidth;
      H = header.clientHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    // 細小金塵：像被風吹動，整片緩緩流動，偶有陣風
    const N = Math.min(260, Math.floor(window.innerWidth / 4.5));
    const golds = ['233,221,187', '218,200,156', '210,191,142', '186,160,108', '169,142,93'];
    const ps = [];
    for (let i = 0; i < N; i++) {
      ps.push({
        x: Math.random(),
        y: Math.random(),
        r: .3 + Math.random() * .9,            // 細小如塵
        sp: .35 + Math.random() * .95,         // 個別風感係數（近快遠慢）
        drift: -.012 + Math.random() * .024,   // 微微上下飄移
        wob: .4 + Math.random() * 1.1,         // 上下波動頻率
        wobAmp: 2 + Math.random() * 9,         // 波動幅度
        tw: .6 + Math.random() * 2.2,          // 閃爍速度
        phase: Math.random() * Math.PI * 2,
        color: golds[Math.floor(Math.random() * golds.length)]
      });
    }

    // 波浪金線：幾條起伏流動的細金線
    const waves = [
      { yp: .30, amp: 14, len: .0052, speed: .50, alpha: .19, lw: 1.5, phase: 0 },
      { yp: .46, amp: 22, len: .0036, speed: .32, alpha: .14, lw: 1.8, phase: 2.1 },
      { yp: .62, amp: 17, len: .0046, speed: .42, alpha: .16, lw: 1.4, phase: 4.2 },
      { yp: .80, amp: 26, len: .0030, speed: .26, alpha: .11, lw: 2.0, phase: 1.3 }
    ];
    function drawWaves(s) {
      for (const w of waves) {
        ctx.beginPath();
        for (let x = 0; x <= W; x += 6) {
          const y = H * w.yp
            + Math.sin(x * w.len + s * w.speed + w.phase) * w.amp
            + Math.sin(x * w.len * 2.7 - s * w.speed * .7 + w.phase) * w.amp * .35;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        const breathe = .75 + .25 * Math.sin(s * .5 + w.phase);   // 緩慢呼吸的亮度
        ctx.strokeStyle = 'rgba(210,191,142,' + (w.alpha * breathe).toFixed(3) + ')';
        ctx.lineWidth = w.lw;
        ctx.stroke();
      }
    }

    let last = 0;
    function draw(t) {
      const s = t / 1000;
      const dt = Math.min((t - last) / 1000, .05) || .016;
      last = t;
      // 風：基礎風 + 緩慢起伏的陣風
      const wind = 14 + 17 * (0.5 + 0.5 * Math.sin(s * .22)) + 6 * Math.sin(s * .61 + 2);
      ctx.clearRect(0, 0, W, H);
      drawWaves(s);
      for (const p of ps) {
        p.x += (wind * p.sp * dt) / W;          // 順風橫飄
        p.y += p.drift * dt;
        if (p.x > 1.02) { p.x = -0.02; p.y = Math.random(); }
        if (p.y < -0.03) p.y = 1.02;
        if (p.y > 1.03) p.y = -0.02;
        const x = p.x * W;
        const y = p.y * H + Math.sin(s * p.wob + p.phase) * p.wobAmp;
        const a = Math.max(0, .18 + .82 * (0.5 + 0.5 * Math.sin(s * p.tw * 2 + p.phase)));
        ctx.beginPath();
        ctx.arc(x, y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(' + p.color + ',' + (a * .98).toFixed(3) + ')';
        ctx.fill();
      }
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  })();

  // ── 頂部海報輪播帶：兩條弧形影帶（上凹下拱），海報沿弧線流動 ──
  (function buildMarquee() {
    const picks = [];
    for (const f of films) {
      if (LAST.has(f.n)) continue;
      const items = itemsByFilm.get(f.n);
      const pick = items.find(it => it.h > it.w) || items[0];
      picks.push({ film: f.n, it: pick });
      if (picks.length >= 64) break;
    }
    const zone = document.getElementById('marquee');
    const rows = [
      { el: document.getElementById('marqueeTrack'),  picks: picks.filter((_, i) => i % 2 === 0), dir: -1, speed: 42, curve: 60 },
      { el: document.getElementById('marqueeTrack2'), picks: picks.filter((_, i) => i % 2 === 1), dir: 1,  speed: 34, curve: -60 }
    ];
    for (const row of rows) {
      for (let round = 0; round < 2; round++) {
        for (const p of row.picks) {
          const wrap = document.createElement('div');
          wrap.className = 'mq-item';
          const img = document.createElement('img');
          img.src = 'thumbs/' + p.it.f;
          img.alt = p.film;
          img.title = p.film;
          img.loading = round === 0 ? 'eager' : 'lazy';
          img.addEventListener('click', () => {
            filmSelect.value = p.film;
            render();
            const idx = flat.indexOf(p.it);
            openLightbox(idx >= 0 ? idx : 0);
          });
          wrap.appendChild(img);
          row.el.appendChild(wrap);
        }
      }
      row.off = 0;
      row.items = [];
      row.half = 0;
    }
    function measure(row) {
      row.items = [...row.el.children].map(el => ({ el, left: el.offsetLeft, w: el.offsetWidth }));
      row.half = row.el.scrollWidth / 2;
    }
    rows.forEach(measure);
    window.addEventListener('resize', () => rows.forEach(measure));
    setTimeout(() => rows.forEach(measure), 1500);   // 圖片載入後寬度會變，再量
    setTimeout(() => rows.forEach(measure), 4500);

    // 滑鼠移上去緩緩停下
    let speedF = 1, targetF = 1;
    zone.addEventListener('mouseenter', () => { targetF = 0; });
    zone.addEventListener('mouseleave', () => { targetF = 1; });

    let lastT = 0;
    function tick(t) {
      const dt = Math.min((t - lastT) / 1000, .05) || .016;
      lastT = t;
      speedF += (targetF - speedF) * Math.min(1, dt * 5);
      const W = zone.clientWidth || 1;
      for (const row of rows) {
        if (!row.half) measure(row);
        row.off += row.dir * row.speed * speedF * dt;
        if (row.half > 0) {
          row.off = row.off % row.half;
          if (row.off > 0) row.off -= row.half;
        }
        row.el.style.transform = 'translateX(' + row.off.toFixed(2) + 'px)';
        // 沿弧線：中間最彎、兩端回平，並順著弧度微微旋轉
        const cuF = Math.min(1, Math.max(.45, W / 1000));   // 小螢幕弧度縮小
        for (const it of row.items) {
          const cx = it.left + it.w / 2 + row.off;
          const tt = Math.max(-.65, Math.min(.65, cx / W - .5));
          const y = row.curve * cuF * (1 - 4 * tt * tt);
          const ang = row.curve * cuF * (-8 * tt) / W;
          it.el.style.transform = 'translateY(' + y.toFixed(2) + 'px) rotate(' + ang.toFixed(4) + 'rad)';
        }
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  })();

  let flat = [];  // 目前顯示中的圖片（燈箱用）

  function render() {
    const q = searchBox.value.trim().toLowerCase();
    const sel = filmSelect.value;
    content.innerHTML = '';
    flat = [];
    let lastYear = null;
    let shownFilms = 0;

    for (const f of films) {
      if (sel && f.n !== sel) continue;
      if (q && !f.n.toLowerCase().includes(q)) continue;
      const items = itemsByFilm.get(f.n);
      shownFilms++;

      // 年份分隔線
      const isLast = LAST.has(f.n);
      const yearKey = isLast ? '其他' : (f.y || '其他');
      if (!sel && yearKey !== lastYear) {
        lastYear = yearKey;
        const div = document.createElement('div');
        div.className = 'year-divider';
        div.innerHTML = '<span class="y">' + yearKey + '</span>';
        content.appendChild(div);
      }

      const sec = document.createElement('section');
      sec.className = 'film';
      const head = document.createElement('div');
      head.className = 'film-head';
      head.innerHTML = '<h2>' + f.n + '</h2><span class="n">' + items.length + ' 件</span>' +
        (f.e && !isLast ? '<span class="est">年份推估</span>' : '');
      sec.appendChild(head);

      const grid = document.createElement('div');
      grid.className = 'masonry';
      for (const it of items) {
        const idx = flat.length;
        flat.push(it);
        const div = document.createElement('div');
        div.className = 'item';
        const img = document.createElement('img');
        img.loading = 'lazy';
        img.src = 'thumbs/' + it.f;
        img.alt = it.t;
        img.width = it.w;
        img.height = it.h;
        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = it.t;
        div.appendChild(img);
        div.appendChild(label);
        div.addEventListener('click', () => openLightbox(idx));
        grid.appendChild(div);
      }
      sec.appendChild(grid);
      content.appendChild(sec);
    }

    shownInfo.textContent = flat.length + ' / ' + DATA.items.length;
    emptyMsg.style.display = shownFilms ? 'none' : 'block';
  }

  searchBox.addEventListener('input', render);
  filmSelect.addEventListener('change', () => {
    render();
    window.scrollTo({ top: 0 });
    if (filmSelect.value && flat.length) openLightbox(0);   // 選片直接開始播放
  });

  // ── 燈箱 ──
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const lbCaption = document.getElementById('lbCaption');
  const lbCounter = document.getElementById('lbCounter');
  let current = -1;

  // 自動播放：每 3 秒換下一張
  let autoTimer = null, autoPlaying = true;
  const lbPlay = document.getElementById('lbPlay');
  function startAuto() {
    clearInterval(autoTimer);
    autoTimer = setInterval(() => step(1), 1800);
    autoPlaying = true;
    lbPlay.textContent = '⏸';
  }
  function stopAuto() {
    clearInterval(autoTimer);
    autoTimer = null;
    autoPlaying = false;
    lbPlay.textContent = '▶';
  }
  lbPlay.addEventListener('click', e => {
    e.stopPropagation();
    autoPlaying ? stopAuto() : startAuto();
  });

  function openLightbox(idx) {
    current = idx;
    updateLightbox();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    startAuto();
  }
  function updateLightbox() {
    const m = flat[current];
    lbImg.src = 'full/' + m.f;
    lbImg.alt = m.t;
    lbCaption.innerHTML = '<div class="film-name">' + m.g + '</div>' + m.t;
    lbCounter.textContent = (current + 1) + ' / ' + flat.length;
    if (current + 1 < flat.length) (new Image()).src = 'full/' + flat[current + 1].f;
    if (current > 0) (new Image()).src = 'full/' + flat[current - 1].f;
  }
  function closeLightbox() {
    clearInterval(autoTimer);
    autoTimer = null;
    lightbox.classList.remove('open');
    lbImg.src = '';
    document.body.style.overflow = '';
  }
  function step(d) {
    current = (current + d + flat.length) % flat.length;
    updateLightbox();
  }

  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbPrev').addEventListener('click', e => { e.stopPropagation(); step(-1); if (autoPlaying) startAuto(); });
  document.getElementById('lbNext').addEventListener('click', e => { e.stopPropagation(); step(1); if (autoPlaying) startAuto(); });
  lightbox.addEventListener('click', e => { if (e.target === lightbox || e.target === lbImg) closeLightbox(); });
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') { step(-1); if (autoPlaying) startAuto(); }
    if (e.key === 'ArrowRight') { step(1); if (autoPlaying) startAuto(); }
    if (e.key === ' ') { e.preventDefault(); autoPlaying ? stopAuto() : startAuto(); }
  });

  let touchX = null;
  lightbox.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
  lightbox.addEventListener('touchend', e => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 50) step(dx > 0 ? -1 : 1);
    touchX = null;
  }, { passive: true });

  render();

  // 進站自動開始海報播放（✕ 可關閉回到圖牆）
  setTimeout(() => {
    if (flat.length) openLightbox(0);
  }, 900);
})();
</script>
