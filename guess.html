<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猜片名 — 陳正源海報作品集</title>
<style>
  :root {
    --bg: #0a0a0c;
    --card: #18181d;
    --text: #f2efe8;
    --muted: #9a968e;
    --accent: #b29760;
    --gold-light: #dcc99a;
    --gold-dim: rgba(181,153,100,.48);
    --serif: "Didot", "Bodoni 72", "Playfair Display", "Songti TC", "Noto Serif TC", "Times New Roman", serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background:
      radial-gradient(ellipse 90% 60% at 50% -10%, rgba(169,142,93,.08), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 22px 14px 50px;
    -webkit-font-smoothing: antialiased;
  }
  h1 {
    font-family: var(--serif);
    font-size: clamp(24px, 5vw, 36px);
    letter-spacing: .14em;
    background: linear-gradient(180deg, #f1e6c6, #d3c294 55%, #8e774a);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .sub { margin-top: 6px; color: var(--muted); font-size: 13px; letter-spacing: .2em; }
  .bar {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    margin: 14px 0 16px;
  }
  .bar .stat { color: var(--muted); font-size: 14px; letter-spacing: .06em; }
  .bar .stat b { color: var(--gold-light); font-weight: 600; }
  button, .home {
    background: var(--card);
    border: 1px solid #2e2e36;
    border-radius: 999px;
    color: var(--text);
    font-size: 14px;
    padding: 9px 18px;
    cursor: pointer;
    text-decoration: none;
    letter-spacing: .06em;
  }
  button:hover, .home:hover { border-color: var(--accent); }

  .stage {
    position: relative;
    width: min(360px, 88vw);
    height: min(360px, 88vw);
    border: 1px solid var(--gold-dim);
    outline: 1px solid rgba(181,153,100,.15);
    outline-offset: 4px;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 24px 70px rgba(0,0,0,.65);
    background-color: #101013;
    background-repeat: no-repeat;
    transition: background-size .6s ease, background-position .6s ease;
  }
  .stage .reveal {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(8,8,10,.88);
    opacity: 0;
    pointer-events: none;
    transition: opacity .5s ease;
  }
  .stage.show .reveal { opacity: 1; }
  .stage .reveal img {
    max-width: 92%;
    max-height: 92%;
    border-radius: 4px;
    box-shadow: 0 10px 40px rgba(0,0,0,.8), 0 0 30px rgba(220,201,154,.25);
  }
  .verdict {
    min-height: 30px;
    margin: 14px 0 4px;
    font-family: var(--serif);
    font-size: 21px;
    letter-spacing: .12em;
    text-align: center;
  }
  .verdict.ok { color: var(--gold-light); text-shadow: 0 0 18px rgba(220,201,154,.5); }
  .verdict.no { color: #c98a7a; }

  .choices {
    display: grid;
    grid-template-columns: repeat(2, minmax(150px, 230px));
    gap: 10px;
    margin-top: 8px;
    width: min(480px, 92vw);
  }
  .choices button {
    border-radius: 12px;
    padding: 13px 10px;
    font-size: 15px;
    line-height: 1.35;
    letter-spacing: .04em;
  }
  .choices button.right {
    border-color: var(--gold-light);
    color: var(--gold-light);
    box-shadow: 0 0 16px rgba(220,201,154,.45);
  }
  .choices button.wrong { border-color: #8a5345; color: #c98a7a; opacity: .8; }
  .choices button:disabled { cursor: default; }

  .next-row { margin-top: 16px; min-height: 46px; }
  #nextBtn, #againBtn {
    display: none;
    border-color: var(--gold-dim);
    color: var(--gold-light);
    font-size: 15px;
    padding: 11px 30px;
  }
  .final {
    display: none;
    text-align: center;
    margin-top: 10px;
  }
  .final .t {
    font-family: var(--serif);
    font-size: clamp(28px, 6vw, 42px);
    letter-spacing: .16em;
    background: linear-gradient(180deg, #f6ecd0, #d3c294 55%, #8e774a);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .final .s { margin-top: 8px; color: var(--gold-light); font-size: 16px; letter-spacing: .1em; }
  footer { margin-top: 26px; color: var(--muted); font-size: 12px; letter-spacing: .1em; }
</style>
</head>
<body>

<h1>看 局 部 ・ 猜 片 名</h1>
<div class="sub">放大鏡下的海報，猜得出是哪部片嗎？</div>

<div class="bar">
  <a class="home" href="index.html">‹ 作品集</a>
  <span class="stat">第 <b id="round">1</b> / 10 題</span>
  <span class="stat">得分 <b id="score">0</b></span>
  <button id="hintBtn">看大一點 🔍</button>
</div>

<div class="stage" id="stage">
  <div class="reveal"><img id="revealImg" alt="完整海報"></div>
</div>
<div class="verdict" id="verdict"></div>

<div class="choices" id="choices"></div>

<div class="next-row">
  <button id="nextBtn">下一題 ›</button>
  <button id="againBtn">再玩一輪</button>
</div>

<div class="final" id="final">
  <div class="t" id="finalT"></div>
  <div class="s" id="finalS"></div>
</div>

<footer>© 陳正源 STONE CHEN 海報作品集</footer>

<script src="images.js"></script>
<script>
(function () {
  const stage = document.getElementById('stage');
  const revealImg = document.getElementById('revealImg');
  const choicesEl = document.getElementById('choices');
  const verdict = document.getElementById('verdict');
  const roundEl = document.getElementById('round');
  const scoreEl = document.getElementById('score');
  const nextBtn = document.getElementById('nextBtn');
  const againBtn = document.getElementById('againBtn');
  const hintBtn = document.getElementById('hintBtn');
  const finalEl = document.getElementById('final');

  // 每部片挑一張海報，至少要有 4 部才能出題
  const films = [...new Set(DATA.items.map(i => i.g))];
  const byFilm = {};
  for (const it of DATA.items) (byFilm[it.g] = byFilm[it.g] || []).push(it);

  const TOTAL = 10;
  let order = [], round = 0, score = 0, zoom = 0, answered = false, cur = null;

  function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function startGame() {
    order = shuffle(films.slice()).slice(0, TOTAL);
    round = 0;
    score = 0;
    scoreEl.textContent = '0';
    finalEl.style.display = 'none';
    againBtn.style.display = 'none';
    nextRound();
  }

  function setZoom() {
    // zoom 級數：0=很近 1=近 2=完整
    const sizes = ['380% auto', '230% auto', '100% auto'];
    const it = cur.it;
    const boxRatio = 1;                       // 正方形舞台
    const imgRatio = it.w / it.h;
    if (zoom >= 2) {
      stage.style.backgroundSize = imgRatio > boxRatio ? '100% auto' : 'auto 100%';
      stage.style.backgroundPosition = 'center';
    } else {
      stage.style.backgroundSize = sizes[zoom];
      stage.style.backgroundPosition = cur.px + '% ' + cur.py + '%';
    }
    hintBtn.disabled = zoom >= 1 || answered;  // 只能用一次提示
  }

  function nextRound() {
    if (round >= TOTAL) return endGame();
    round++;
    roundEl.textContent = round;
    answered = false;
    zoom = 0;
    verdict.textContent = '';
    verdict.className = 'verdict';
    nextBtn.style.display = 'none';
    stage.classList.remove('show');
    hintBtn.disabled = false;

    const film = order[round - 1];
    const items = byFilm[film];
    const it = items[Math.floor(Math.random() * items.length)];
    cur = {
      film, it,
      px: 15 + Math.random() * 70,   // 局部位置（避開最邊緣）
      py: 12 + Math.random() * 60    // 偏上半部（海報主視覺通常在上）
    };
    stage.style.backgroundImage = 'url("full/' + it.f + '")';
    setZoom();
    revealImg.src = 'thumbs/' + it.f;

    // 四個選項：1 正解 + 3 干擾
    const wrongs = shuffle(films.filter(f => f !== film)).slice(0, 3);
    const opts = shuffle([film, ...wrongs]);
    choicesEl.innerHTML = '';
    for (const name of opts) {
      const b = document.createElement('button');
      b.textContent = name;
      b.addEventListener('click', () => answer(b, name));
      choicesEl.appendChild(b);
    }
  }

  function answer(btn, name) {
    if (answered) return;
    answered = true;
    hintBtn.disabled = true;
    const right = name === cur.film;
    for (const b of choicesEl.children) {
      b.disabled = true;
      if (b.textContent === cur.film) b.classList.add('right');
      else if (b === btn) b.classList.add('wrong');
    }
    if (right) {
      score++;
      scoreEl.textContent = score;
      verdict.textContent = '答對了！';
      verdict.className = 'verdict ok';
    } else {
      verdict.textContent = '是《' + cur.film + '》';
      verdict.className = 'verdict no';
    }
    stage.classList.add('show');     // 揭曉完整海報
    nextBtn.style.display = round >= TOTAL ? 'none' : 'inline-block';
    if (round >= TOTAL) setTimeout(endGame, 1200);
  }

  function endGame() {
    finalEl.style.display = 'block';
    document.getElementById('finalT').textContent =
      score === TOTAL ? '滿 分！' : score >= 7 ? '太 厲 害 了' : score >= 4 ? '不 錯 喔' : '再 挑 戰 一 次';
    document.getElementById('finalS').textContent = '答對 ' + score + ' / ' + TOTAL + ' 題';
    againBtn.style.display = 'inline-block';
    nextBtn.style.display = 'none';
  }

  hintBtn.addEventListener('click', () => {
    if (answered || zoom >= 1) return;
    zoom = 1;
    setZoom();
  });
  nextBtn.addEventListener('click', nextRound);
  againBtn.addEventListener('click', startGame);

  startGame();
})();
</script>
</body>
</html>
