<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星際飛碟大作戰</title>
<meta property="og:title" content="星際飛碟大作戰">
<meta property="og:description" content="駕駛戰機擊落飛碟！手機電腦都能玩的射擊小遊戲">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#04060f;
    font-family:"PingFang TC","Microsoft JhengHei",sans-serif;
    touch-action:none; -webkit-user-select:none; user-select:none;
  }
  #game { display:block; width:100%; height:100%; }
  #overlay {
    position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    background:rgba(4,6,15,.78); color:#e8d9b0; z-index:10;
    transition:opacity .4s;
  }
  #overlay.hidden { opacity:0; pointer-events:none; }
  #overlay h1 {
    font-size:clamp(30px,8vw,56px); letter-spacing:.12em;
    background:linear-gradient(180deg,#f3e3b5,#a98e5d);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin-bottom:14px; text-shadow:0 0 30px rgba(169,142,93,.25);
  }
  #overlay p { font-size:clamp(14px,3.6vw,18px); line-height:1.9; color:#cdbf9c; margin-bottom:8px; }
  #overlay .score-line { font-size:clamp(18px,5vw,26px); color:#f3e3b5; margin-bottom:6px; }
  #startBtn {
    margin-top:22px; padding:14px 52px; font-size:clamp(16px,4.5vw,21px);
    letter-spacing:.25em; text-indent:.25em; color:#0b0e1a; cursor:pointer;
    background:linear-gradient(180deg,#e9d6a4,#a98e5d);
    border:none; border-radius:40px;
    box-shadow:0 0 24px rgba(169,142,93,.45), inset 0 1px 0 rgba(255,255,255,.5);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 50% { box-shadow:0 0 44px rgba(169,142,93,.8), inset 0 1px 0 rgba(255,255,255,.5); } }
  #hud {
    position:fixed; top:0; left:0; right:0; z-index:5;
    display:flex; justify-content:space-between; align-items:center;
    padding:calc(10px + env(safe-area-inset-top)) 16px 8px;
    font-size:clamp(14px,3.8vw,18px); color:#e8d9b0; pointer-events:none;
    text-shadow:0 1px 6px #000;
  }
  #hud span b { color:#f3e3b5; font-variant-numeric:tabular-nums; }
  .hint { font-size:12px; color:#8c7f60; margin-top:18px; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud" style="display:none">
  <span>分數 <b id="hScore">0</b></span>
  <span id="hWave">第 1 波</span>
  <span id="hLives">❤️❤️❤️</span>
</div>
<div id="overlay">
  <h1>星際飛碟大作戰</h1>
  <p id="ovMsg">飛碟大軍來襲！駕駛你的戰機保衛地球</p>
  <div class="score-line" id="ovScore" style="display:none"></div>
  <p>📱 手指拖曳移動　🖱️ 滑鼠或 ←→ 鍵移動<br>戰機會自動開火，躲開飛碟的炸彈！</p>
  <button id="startBtn">開始遊戲</button>
  <p class="hint" id="bestLine"></p>
</div>
<script>
(() => {
const cv = document.getElementById('game');
const cx = cv.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const hud = document.getElementById('hud');
const hScore = document.getElementById('hScore');
const hWave = document.getElementById('hWave');
const hLives = document.getElementById('hLives');
const ovMsg = document.getElementById('ovMsg');
const ovScore = document.getElementById('ovScore');
const bestLine = document.getElementById('bestLine');

let W, H, DPR;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  cx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* ---------- 音效（Web Audio 合成，不需外部檔案） ---------- */
let AC = null;
function audio() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
  return AC;
}
function beep(freq, dur, type, vol, slide) {
  try {
    const ac = audio();
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, ac.currentTime);
    if (slide) o.frequency.exponentialRampToValueAtTime(slide, ac.currentTime + dur);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.connect(g).connect(ac.destination);
    o.start(); o.stop(ac.currentTime + dur);
  } catch (e) {}
}
const sfx = {
  shoot: () => beep(880, .08, 'square', .04, 440),
  boom:  () => beep(220, .3, 'sawtooth', .12, 40),
  hit:   () => beep(110, .5, 'sawtooth', .2, 30),
  power: () => beep(523, .25, 'sine', .15, 1046),
};

/* ---------- 星空背景 ---------- */
let stars = [];
function makeStars() {
  stars = [];
  for (let i = 0; i < 90; i++) stars.push({
    x: Math.random() * W, y: Math.random() * H,
    r: Math.random() * 1.4 + .3, s: Math.random() * 28 + 12,
    tw: Math.random() * Math.PI * 2
  });
}
makeStars();

/* ---------- 遊戲狀態 ---------- */
const ST = { menu: 0, play: 1, over: 2 };
let state = ST.menu;
let score, lives, wave, ufos, bullets, bombs, parts, popups, player;
let shootTimer, waveTimer, shakeT, time = 0;
let best = +(localStorage.getItem('ufoBest') || 0);
if (best) bestLine.textContent = '歷史最高分：' + best;

function reset() {
  score = 0; lives = 3; wave = 0;
  ufos = []; bullets = []; bombs = []; parts = []; popups = [];
  player = { x: W / 2, y: H - 90, w: Math.min(52, W * .12), inv: 0, power: 0 };
  shootTimer = 0; waveTimer = 0; shakeT = 0;
  spawnWave();
  updateHud();
}

function spawnWave() {
  wave++;
  const cols = Math.min(4 + Math.floor(wave / 2), 7);
  const rows = Math.min(2 + Math.floor(wave / 3), 4);
  const gapX = Math.min(86, (W - 60) / cols);
  const speed = 36 + wave * 7;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      ufos.push({
        bx: W / 2 + (c - (cols - 1) / 2) * gapX,
        by: 90 + r * 64,
        x: 0, y: -100 - r * 70,
        ph: Math.random() * Math.PI * 2,
        amp: 18 + Math.random() * 14,
        hp: wave >= 6 && Math.random() < .25 ? 2 : 1,
        sp: speed, drop: 0, in: true,
        r: Math.min(24, W * .055)
      });
    }
  hWave.textContent = '第 ' + wave + ' 波';
}

function updateHud() {
  hScore.textContent = score;
  hLives.textContent = '❤️'.repeat(Math.max(0, lives));
}

function explode(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, v = Math.random() * 160 + 40;
    parts.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v, life: .6 + Math.random() * .4, t: 0, color });
  }
}
function popup(x, y, txt) { popups.push({ x, y, txt, t: 0 }); }

/* ---------- 操控 ---------- */
let targetX = null;
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; if (e.key === ' ' && state !== ST.play) start(); });
window.addEventListener('keyup', e => keys[e.key] = false);
function pointTo(e) {
  const t = e.touches ? e.touches[0] : e;
  targetX = t.clientX;
}
cv.addEventListener('pointerdown', pointTo);
cv.addEventListener('pointermove', e => { if (e.buttons || e.pointerType === 'touch') pointTo(e); else if (e.pointerType === 'mouse') pointTo(e); });
cv.addEventListener('touchstart', pointTo, { passive: true });
cv.addEventListener('touchmove', pointTo, { passive: true });

function start() {
  audio();
  reset();
  state = ST.play;
  overlay.classList.add('hidden');
  hud.style.display = 'flex';
}
startBtn.addEventListener('click', start);

function gameOver() {
  state = ST.over;
  sfx.hit();
  shakeT = .5;
  if (score > best) { best = score; localStorage.setItem('ufoBest', best); }
  setTimeout(() => {
    ovMsg.textContent = '地球防線被突破了…再來一次！';
    ovScore.style.display = 'block';
    ovScore.textContent = '本次得分：' + score + '　🏆 最高分：' + best;
    bestLine.textContent = '撐到了第 ' + wave + ' 波';
    startBtn.textContent = '再玩一次';
    overlay.classList.remove('hidden');
  }, 900);
}

/* ---------- 繪圖 ---------- */
function drawPlayer(p) {
  cx.save();
  cx.translate(p.x, p.y);
  if (p.inv > 0 && Math.floor(p.inv * 12) % 2) cx.globalAlpha = .35;
  const w = p.w;
  // 噴射火焰
  const fl = 14 + Math.sin(time * 40) * 5;
  const fg = cx.createLinearGradient(0, w * .5, 0, w * .5 + fl + 10);
  fg.addColorStop(0, '#ffd27d'); fg.addColorStop(1, 'rgba(255,80,0,0)');
  cx.fillStyle = fg;
  cx.beginPath();
  cx.moveTo(-w * .12, w * .45); cx.lineTo(w * .12, w * .45); cx.lineTo(0, w * .45 + fl + 8);
  cx.fill();
  // 機身
  const g = cx.createLinearGradient(-w / 2, 0, w / 2, 0);
  g.addColorStop(0, '#5a6f9e'); g.addColorStop(.5, '#dfe9ff'); g.addColorStop(1, '#5a6f9e');
  cx.fillStyle = g;
  cx.beginPath();
  cx.moveTo(0, -w * .62);
  cx.quadraticCurveTo(w * .16, -w * .2, w * .18, w * .1);
  cx.lineTo(w * .55, w * .38); cx.lineTo(w * .55, w * .5); cx.lineTo(w * .14, w * .42);
  cx.lineTo(w * .1, w * .52); cx.lineTo(-w * .1, w * .52); cx.lineTo(-w * .14, w * .42);
  cx.lineTo(-w * .55, w * .5); cx.lineTo(-w * .55, w * .38); cx.lineTo(-w * .18, w * .1);
  cx.quadraticCurveTo(-w * .16, -w * .2, 0, -w * .62);
  cx.fill();
  // 座艙
  cx.fillStyle = '#9fdcff';
  cx.beginPath(); cx.ellipse(0, -w * .15, w * .07, w * .16, 0, 0, Math.PI * 2); cx.fill();
  // 雙倍火力光環
  if (p.power > 0) {
    cx.strokeStyle = 'rgba(255,220,120,' + (.4 + Math.sin(time * 10) * .2) + ')';
    cx.lineWidth = 2;
    cx.beginPath(); cx.arc(0, 0, w * .75, 0, Math.PI * 2); cx.stroke();
  }
  cx.restore();
}

function drawUfo(u) {
  cx.save();
  cx.translate(u.x, u.y);
  const r = u.r;
  const wob = Math.sin(time * 6 + u.ph) * .08;
  cx.rotate(wob);
  // 光束閃爍
  cx.fillStyle = 'rgba(140,255,170,' + (.06 + Math.sin(time * 8 + u.ph) * .04) + ')';
  cx.beginPath();
  cx.moveTo(-r * .5, r * .25); cx.lineTo(r * .5, r * .25);
  cx.lineTo(r * 1.1, r * 2.4); cx.lineTo(-r * 1.1, r * 2.4);
  cx.fill();
  // 圓頂
  const dg = cx.createRadialGradient(-r * .15, -r * .5, r * .05, 0, -r * .3, r * .7);
  dg.addColorStop(0, u.hp > 1 ? '#ffd9f2' : '#d2f8ff');
  dg.addColorStop(1, u.hp > 1 ? '#c2438f' : '#2e7fa8');
  cx.fillStyle = dg;
  cx.beginPath(); cx.ellipse(0, -r * .3, r * .55, r * .55, 0, Math.PI, 0); cx.fill();
  // 碟身
  const bg = cx.createLinearGradient(0, -r * .3, 0, r * .4);
  bg.addColorStop(0, '#cfd8e6'); bg.addColorStop(.5, '#8a97ad'); bg.addColorStop(1, '#4a5568');
  cx.fillStyle = bg;
  cx.beginPath(); cx.ellipse(0, 0, r, r * .38, 0, 0, Math.PI * 2); cx.fill();
  // 跑馬燈
  for (let i = 0; i < 5; i++) {
    const a = i / 5 * Math.PI * 2 + time * 2.5;
    cx.fillStyle = (Math.floor(time * 6 + i) % 5 === 0) ? '#fffbe0' : '#ffb347';
    cx.beginPath();
    cx.arc(Math.cos(a) * r * .72, Math.sin(a) * r * .26 + r * .05, r * .09, 0, Math.PI * 2);
    cx.fill();
  }
  cx.restore();
}

/* ---------- 主迴圈 ---------- */
let last = performance.now();
function loop(now) {
  requestAnimationFrame(loop);
  let dt = Math.min((now - last) / 1000, .05);
  last = now;
  time += dt;

  // 背景
  cx.fillStyle = '#04060f';
  cx.fillRect(0, 0, W, H);
  const ng = cx.createRadialGradient(W * .7, H * .15, 0, W * .7, H * .15, H * .8);
  ng.addColorStop(0, 'rgba(60,45,90,.35)'); ng.addColorStop(1, 'rgba(0,0,0,0)');
  cx.fillStyle = ng; cx.fillRect(0, 0, W, H);
  for (const s of stars) {
    s.y += s.s * dt * (state === ST.play ? 1.6 : .5);
    if (s.y > H) { s.y = -2; s.x = Math.random() * W; }
    cx.globalAlpha = .4 + Math.sin(time * 3 + s.tw) * .3;
    cx.fillStyle = '#cfd8ff';
    cx.beginPath(); cx.arc(s.x, s.y, s.r, 0, Math.PI * 2); cx.fill();
  }
  cx.globalAlpha = 1;

  if (shakeT > 0) {
    shakeT -= dt;
    cx.save();
    cx.translate((Math.random() - .5) * 10 * shakeT * 4, (Math.random() - .5) * 10 * shakeT * 4);
  }

  if (state === ST.play) update(dt);

  // 畫物件（結束畫面仍會殘留粒子，好看）
  for (const b of bullets) {
    cx.fillStyle = '#ffe9a8';
    cx.shadowColor = '#ffcf5e'; cx.shadowBlur = 8;
    cx.fillRect(b.x - 2, b.y - 10, 4, 14);
    cx.shadowBlur = 0;
  }
  for (const u of ufos) drawUfo(u);
  for (const bm of bombs) {
    cx.fillStyle = bm.pw ? '#9dffb0' : '#ff7b6b';
    cx.shadowColor = bm.pw ? '#5eff8a' : '#ff3b1f'; cx.shadowBlur = 10;
    cx.beginPath();
    if (bm.pw) { // 能量補給：星形
      const r1 = 9, r2 = 4;
      for (let i = 0; i < 10; i++) {
        const a = i * Math.PI / 5 - Math.PI / 2 + time * 3;
        const rr = i % 2 ? r2 : r1;
        cx[i ? 'lineTo' : 'moveTo'](bm.x + Math.cos(a) * rr, bm.y + Math.sin(a) * rr);
      }
      cx.closePath();
    } else {
      cx.arc(bm.x, bm.y, 6, 0, Math.PI * 2);
    }
    cx.fill();
    cx.shadowBlur = 0;
  }
  if (state !== ST.menu) drawPlayer(player);
  for (const p of parts) {
    const a = 1 - p.t / p.life;
    cx.globalAlpha = a;
    cx.fillStyle = p.color;
    cx.beginPath(); cx.arc(p.x, p.y, 2.5 * a + .5, 0, Math.PI * 2); cx.fill();
  }
  cx.globalAlpha = 1;
  for (const pp of popups) {
    cx.globalAlpha = 1 - pp.t;
    cx.fillStyle = '#ffe9a8';
    cx.font = 'bold 18px sans-serif'; cx.textAlign = 'center';
    cx.fillText(pp.txt, pp.x, pp.y - pp.t * 40);
  }
  cx.globalAlpha = 1;

  if (shakeT > 0) cx.restore();

  // 粒子/字幕即使非遊戲中也要更新
  for (const p of parts) { p.t += dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 200 * dt; }
  parts = parts.filter(p => p.t < p.life);
  for (const pp of popups) pp.t += dt;
  popups = popups.filter(p => p.t < 1);
}

function update(dt) {
  const p = player;
  // 移動
  const spd = W * .9;
  if (keys.ArrowLeft || keys.a) { p.x -= spd * dt; targetX = null; }
  if (keys.ArrowRight || keys.d) { p.x += spd * dt; targetX = null; }
  if (targetX != null) p.x += (targetX - p.x) * Math.min(1, dt * 14);
  p.x = Math.max(p.w * .6, Math.min(W - p.w * .6, p.x));
  p.y = H - 90;
  if (p.inv > 0) p.inv -= dt;
  if (p.power > 0) p.power -= dt;

  // 自動開火
  shootTimer -= dt;
  if (shootTimer <= 0) {
    shootTimer = p.power > 0 ? .16 : .28;
    if (p.power > 0) {
      bullets.push({ x: p.x - p.w * .3, y: p.y - p.w * .4 });
      bullets.push({ x: p.x + p.w * .3, y: p.y - p.w * .4 });
    } else {
      bullets.push({ x: p.x, y: p.y - p.w * .6 });
    }
    sfx.shoot();
  }
  for (const b of bullets) b.y -= 560 * dt;
  bullets = bullets.filter(b => b.y > -20);

  // 飛碟
  for (const u of ufos) {
    if (u.in) {
      u.y += 180 * dt;
      u.x = u.bx;
      if (u.y >= u.by) { u.y = u.by; u.in = false; }
    } else {
      u.ph += dt;
      u.x = u.bx + Math.sin(u.ph * 1.4) * u.amp * 2;
      u.y = u.by + Math.sin(u.ph * 2.1) * 10 + Math.min(40, wave * 4) * Math.sin(u.ph * .3);
      u.by += dt * (2 + wave * .8); // 緩慢進逼
      // 丟炸彈
      u.drop -= dt;
      if (u.drop <= 0) {
        u.drop = Math.max(1.2, 5 - wave * .35) * (0.5 + Math.random());
        if (Math.random() < .12) {
          bombs.push({ x: u.x, y: u.y + u.r * .4, vy: 130, pw: true }); // 補給
        } else {
          bombs.push({ x: u.x, y: u.y + u.r * .4, vy: 170 + wave * 12, pw: false });
        }
      }
      if (u.y > H - 130) { gameOver(); return; }
    }
  }

  // 子彈打飛碟
  for (const u of ufos) {
    for (const b of bullets) {
      if (!b.hit && Math.abs(b.x - u.x) < u.r * .95 && Math.abs(b.y - u.y) < u.r * .55) {
        b.hit = true; u.hp--;
        if (u.hp <= 0) {
          u.dead = true;
          const pts = 10 * wave > 100 ? 100 : 10 + (wave - 1) * 5;
          score += pts;
          popup(u.x, u.y, '+' + pts);
          explode(u.x, u.y, '#ffd27d', 18);
          explode(u.x, u.y, '#8be9fd', 10);
          sfx.boom();
        } else {
          explode(b.x, b.y, '#ffffff', 5);
          beep(660, .06, 'square', .05);
        }
      }
    }
  }
  bullets = bullets.filter(b => !b.hit);
  ufos = ufos.filter(u => !u.dead);
  updateHud();

  // 炸彈與補給
  for (const bm of bombs) bm.y += bm.vy * dt;
  for (const bm of bombs) {
    if (Math.abs(bm.x - p.x) < p.w * .45 && Math.abs(bm.y - p.y) < p.w * .45) {
      bm.gone = true;
      if (bm.pw) {
        p.power = 8;
        popup(p.x, p.y - 40, '雙倍火力！');
        sfx.power();
      } else if (p.inv <= 0) {
        lives--;
        p.inv = 1.6;
        shakeT = .35;
        explode(p.x, p.y, '#ff7b6b', 24);
        sfx.hit();
        updateHud();
        if (lives <= 0) { gameOver(); return; }
      }
    }
  }
  bombs = bombs.filter(b => !b.gone && b.y < H + 20);

  // 下一波
  if (ufos.length === 0) {
    waveTimer += dt;
    if (waveTimer > 1.2) {
      waveTimer = 0;
      score += 50;
      popup(W / 2, H / 2, '第 ' + wave + ' 波清空 +50');
      spawnWave();
    }
  }
}

requestAnimationFrame(loop);
})();
</script>
</body>
</html>
